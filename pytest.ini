[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers --ignore=tests/test_e2e_verification.py
markers =
    bootstrap: tests involving bootstrap resampling (can be slow)
    multigroup: tests for multi-group invariance workflow
    growth: tests for growth model time loadings
    unit: fast unit tests
